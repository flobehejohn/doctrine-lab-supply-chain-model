services:
  gitlab:
    image: gitlab/gitlab-ce:17.11.2-ce.0
    container_name: doctrine-gitlab-local
    hostname: gitlab.local
    restart: unless-stopped
    shm_size: "256m"
    ports:
      - "8080:80"
      - "2222:22"
      - "5050:5050"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8080'
        gitlab_rails['gitlab_shell_ssh_port'] = 2222
        registry_external_url 'http://localhost:5050'
        gitlab_rails['registry_enabled'] = true
        registry['enable'] = true
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    healthcheck:
      test: ["CMD-SHELL", "gitlab-healthcheck --fail --max-time 10 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 20
      start_period: 180s

  gitlab-runner:
    image: gitlab/gitlab-runner:v17.11.0
    container_name: doctrine-gitlab-runner-local
    restart: unless-stopped
    depends_on:
      - gitlab
    volumes:
      - gitlab_runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CI_SERVER_URL: "http://gitlab:80"
    # Security note:
    # privileged is intentionally not enabled by default.
    # If a later scenario requires privileged Docker-in-Docker,
    # it must be modeled as a finding with explicit risk review.

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  gitlab_runner_config:
