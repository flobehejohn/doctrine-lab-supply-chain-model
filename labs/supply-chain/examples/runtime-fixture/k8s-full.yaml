apiVersion: v1
kind: Namespace
metadata:
  name: supplychain-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-api-config
  namespace: supplychain-demo
data:
  NODE_ENV: production
  DATABASE_HOST: doctrine-demo-db.local
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: supplychain-demo
type: Opaque
stringData:
  username: app
  password: example-not-for-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: supplychain-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
        - name: auth-api
          image: localhost:5050/root/sample-project:local-fixture
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: auth-api-config
            - secretRef:
                name: db-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: auth-api
  namespace: supplychain-demo
spec:
  selector:
    app: auth-api
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-api
  namespace: supplychain-demo
spec:
  rules:
    - host: auth-api.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-api
                port:
                  number: 80
